<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Whymas</title>

  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Metal+Mania&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      scroll-behavior: smooth;
    }

    body {
      padding: 60px 20px;
      font-family: 'Metal Mania', cursive;
      text-align: center;
      color: #00ff66;
      background-image: url('https://i.pinimg.com/originals/07/30/19/0730193357050e6dd0e369c876b9f60e.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
      pointer-events: none;
    }

    #matrix-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      opacity: 0.65;
      filter: drop-shadow(0 0 7px rgba(0, 255, 140, 0.35));
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-family: 'UnifrakturCook', cursive;
      font-size: clamp(4rem, 10vw, 7rem);
      color: #55cc55;
      margin-bottom: 20px;
      text-shadow:
        0 0 2px #002200,
        0 0 6px #33aa33,
        0 0 10px #228822;
      animation: titleFadeIn 1.8s ease-out both;
    }

    p {
      font-size: 2em;
      color: #bbffbb;
      margin-bottom: 30px;
      text-shadow: 0 0 8px #000;
      animation: fadeIn 2s ease-in;
    }

    iframe {
      margin-top: 30px;
      border: 2px solid #00ff66;
      border-radius: 15px;
      width: 90%;
      max-width: 600px;
      height: 315px;
      box-shadow: 0 0 15px #00ff66;
      transition: transform 0.3s ease;
    }

    iframe:hover {
      transform: scale(1.01);
    }

    .soundcloud-embed iframe {
      height: 166px;
      box-shadow: 0 0 18px #ff0077;
      border-color: #ff0077;
      transition: transform 0.3s ease;
    }

    .soundcloud-embed iframe:hover {
      transform: scale(1.01);
    }

    .links {
      margin-top: 40px;
    }

    .links a {
      display: inline-block;
      margin: 10px;
      padding: 12px 24px;
      background-color: #111;
      color: #00ff66;
      border: 2px solid #008833;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1.5em;
      font-family: 'Metal Mania', cursive;
      box-shadow: 0 0 12px #003300;
      transition: all 0.3s ease;
      will-change: transform;
    }

    .links a:hover {
      background-color: #004400;
      border-color: #00ff66;
      color: #00ffcc;
      box-shadow: 0 0 20px #00ff66;
      transform: scale(1.03);
    }

    @keyframes titleFadeIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <canvas id="matrix-canvas" aria-hidden="true"></canvas>
  <main class="content">
    <h1>WHYMAS</h1>
    <p>PURA MIERDA DE LA BUENA</p>

    <a
      id="youtube-video"
      href="https://www.youtube.com/watch?v=v1AAa-iGx80"
      target="_blank"
      rel="noopener noreferrer"
      style="display: inline-block; margin-top: 30px; width: 90%; max-width: 600px;">
      <img
        src="https://i.ytimg.com/vi/v1AAa-iGx80/hqdefault.jpg"
        alt="Portada del video de YouTube"
        style="display: block; width: 100%; height: 315px; object-fit: cover; border: 2px solid #00ff66; border-radius: 15px; box-shadow: 0 0 15px #00ff66;" />
    </a>

    <div class="links">
      <a href="https://www.youtube.com/channel/UCDBk6MMaxQ0F8mARONsW1lg" target="_blank" rel="noopener noreferrer">YouTube</a>
      <a href="https://www.instagram.com/whymasz" target="_blank" rel="noopener noreferrer">Instagram</a>
      <a href="https://www.tiktok.com/@whyymass" target="_blank" rel="noopener noreferrer">TikTok</a>
    </div>

    <div class="soundcloud-embed">
      <iframe
        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/ezequiel-guaymas-959051410&color=%23ff0055&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true"
        scrolling="no"
        frameborder="no"
        allow="autoplay">
      </iframe>
    </div>
  </main>

  <script>
    const FALLBACK_VIDEO_ID = 'v1AAa-iGx80';
    const CHANNEL_ID = 'UCDBk6MMaxQ0F8mARONsW1lg';
    const MATRIX_CHARS = '01WHYMAS$#@%&*+-';
    function ejecutarSeguro(fn) {
      try {
        fn();
      } catch (error) {
        console.error('Error controlado:', error);
      }
    }
    window.onerror = () => true;
    window.addEventListener('unhandledrejection', (event) => {
      event.preventDefault();
      console.error('Promise rechazada controlada:', event.reason);
    });
    function buildYoutubeEmbedUrl(videoId) {
      if (!videoId) return '';
      const origin = window.location.protocol === 'file:' ? 'https://www.youtube.com' : window.location.origin;
      const params = new URLSearchParams({
        rel: '0',
        modestbranding: '1',
        playsinline: '1',
        origin
      });
      return `https://www.youtube-nocookie.com/embed/${videoId}?${params.toString()}`;
    }

    function setYoutubeVideo(videoId) {
      const iframeYT = document.getElementById('youtube-video');
      if (!iframeYT || !videoId) return;
      iframeYT.src = buildYoutubeEmbedUrl(videoId);
    }

    async function actualizarTopYoutube() {
      const apiKey = 'TU_API_KEY_YOUTUBE'; // Reemplaza con tu API Key real

      if (!apiKey || apiKey === 'TU_API_KEY_YOUTUBE') {
        return; // Sin API key se usa el fallback
      }

      const url = `https://www.googleapis.com/youtube/v3/search?key=${apiKey}&channelId=${CHANNEL_ID}&part=snippet,id&order=viewCount&maxResults=1&type=video`;

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const videoId = data?.items?.[0]?.id?.videoId;
        if (videoId) {
          setYoutubeVideo(videoId);
        }
      } catch (error) {
        console.error('Error al obtener video de YouTube:', error);
      }
    }

    function actualizarSoundcloudLista() {
      const userUrlEncoded = encodeURIComponent('https://soundcloud.com/ezequiel-guaymas-959051410');
      const iframeSC = document.querySelector('.soundcloud-embed iframe');
      if (!iframeSC) return;

      iframeSC.src = `https://w.soundcloud.com/player/?url=${userUrlEncoded}&color=%23ff0055&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true`;
    }

    function iniciarLluviaVerde() {
      const canvas = document.getElementById('matrix-canvas');
      if (!canvas) return;

      const ctx = canvas.getContext('2d', { alpha: true });
      if (!ctx) return;

      let width = 0;
      let height = 0;
      let fontSize = 16;
      let columns = 0;
      let drops = [];
      let rafId = 0;

      function resizeCanvas() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        fontSize = Math.max(14, Math.floor(width / 92));
        columns = Math.floor(width / fontSize);
        drops = Array.from({ length: columns }, () => Math.random() * -100);
        ctx.font = `700 ${fontSize}px monospace`;
      }

      function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
        ctx.fillRect(0, 0, width, height);

        for (let i = 0; i < columns; i++) {
          const text = MATRIX_CHARS[Math.floor(Math.random() * MATRIX_CHARS.length)];
          const x = i * fontSize;
          const y = drops[i] * fontSize;

          const alpha = 0.48 + Math.random() * 0.42;
          ctx.fillStyle = `rgba(0, 255, 125, ${alpha})`;
          ctx.fillText(text, x, y);

          if (y > height && Math.random() > 0.975) {
            drops[i] = Math.random() * -25;
          }
          drops[i] += 0.55 + Math.random() * 0.35;
        }

        rafId = window.requestAnimationFrame(draw);
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      draw();

      window.addEventListener('beforeunload', () => {
        window.cancelAnimationFrame(rafId);
      });
    }

    window.onload = () => {
      ejecutarSeguro(() => actualizarSoundcloudLista());
      ejecutarSeguro(() => iniciarLluviaVerde());
    };
  </script>
</body>
</html>
